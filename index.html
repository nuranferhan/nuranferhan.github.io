<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>CSS Temel Ödevi - Nuran Ferhan Kasap</title>
    <link rel="stylesheet" href="styles/style.css">
    <style>
        :root {
            --primary-blue: #2563eb;
            --primary-purple: #7c3aed;
            --bg-light: #f8fafc;
            --text-dark: #1e293b;
            --card-white: #ffffff;
        }

        .user-profile-header {
            background: var(--card-white);
            color: var(--text-dark);
            padding: 25px;
            border-radius: 12px;
            margin-bottom: 25px;
            border: 1px solid #e2e8f0;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            font-family: 'Inter', system-ui, sans-serif;
        }

        .user-info h2 {
            margin: 0;
            font-size: 1.6rem;
            color: var(--text-dark);
            background: linear-gradient(to right, var(--primary-blue), var(--primary-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .user-info p {
            margin: 5px 0 0;
            color: #64748b;
            font-size: 0.95rem;
        }

        .status-badge {
            display: inline-block;
            background: #f1f5f9;
            color: var(--primary-blue);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            margin-top: 10px;
            font-weight: 600;
            border: 1px solid #e2e8f0;
        }

        .flexbox-lab-btn-container { text-align: center; margin: 20px 0; }
        .flexbox-lab-btn {
            display: inline-block;
            padding: 12px 24px;
            background-color: var(--primary-blue);
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-weight: bold;
            transition: transform 0.2s, opacity 0.2s;
        }
        .flexbox-lab-btn:hover { opacity: 0.9; transform: translateY(-1px); }
    </style>
</head>
<body>
    <div class="page-wrapper" style="background-color: var(--bg-light); padding: 20px 0;">
        <div class="container">
            <div class="user-profile-header">
                <div class="user-info">
                    <h2>Nuran Ferhan Kasap</h2>
                    <p>Marmara Üniversitesi | Bilgisayar Mühendisliği</p>
                    <div class="status-badge">Web Programlama Portfolio</div>
                </div>
            </div>
            <nav class="navbar">
                <h1 class="logo">Hafta 2: CSS Temel Ödevi</h1>
                <ul class="nav-links">
                    <li><a href="index.html" class="active">Ana Sayfa</a></li>
                    <li><a href="about.html">Hakkımda</a></li>
                    <li><a href="interests.html">İlgi Alanlarım</a></li>
                    <li><a href="contact.html">İletişim</a></li>
                </ul>
            </nav>
            <header class="intro-text">
                <p>Verilen benzer bir düzenle basit bir web sayfası oluşturun...</p>
            </header>
            <div class="flexbox-lab-btn-container">
                <a href="flexbox-lab/index.html" class="flexbox-lab-btn">Flexbox Ödevi</a>
                <a href="lab-position.html" class="flexbox-lab-btn" style="background-color: #8b5cf6; margin-left: 10px;">Position Ödevi</a>
                <a href="hafta6-1.html" class="flexbox-lab-btn" style="background-color: #3b82f6; margin-left: 10px;">Hafta 6 1</a>
            </div>
            </div>
    </div>
</body>
</html>
