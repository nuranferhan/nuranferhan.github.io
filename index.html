<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuran Ferhan | Portfolio</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&family=Montserrat:wght@800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0e14;
            --gradient: radial-gradient(circle at top right, #1e1b4b, #0f172a, #020617);
            --accent-blue: #38bdf8;
            --accent-purple: #818cf8;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --glass-bg: rgba(30, 41, 59, 0.5);
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--bg-color);
            background-image: var(--gradient);
            background-attachment: fixed;
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            line-height: 1.6;
        }

        body::before {
            content: "";
            position: fixed;
            top: 20%;
            left: 10%;
            width: 300px;
            height: 300px;
            background: var(--accent-purple);
            filter: blur(120px);
            opacity: 0.15;
            z-index: -1;
  
        nav {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px);
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            border-bottom: 1px solid var(--glass-border);
        }

        nav ul {
            list-style: none;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 80px;
            max-width: 1200px;
            margin: 0 auto;
        }

        nav ul li a {
            color: var(--text-secondary);
            text-decoration: none;
            padding: 0.5rem 1.2rem;
            font-weight: 500;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 0.85rem;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        nav ul li a:hover, nav ul li a.active {
            color: var(--accent-blue);
        }

        .hero-section {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding-top: 100px;
            padding-bottom: 50px;
        }

        .portfolio-card {
            text-align: center;
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            padding: 5rem 3.5rem;
            border-radius: 40px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.5);
            max-width: 850px;
            width: 90%;
            transition: transform 0.3s ease;
        }

        .portfolio-card:hover {
            border-color: rgba(56, 189, 248, 0.3);
        }

        h1 {
            font-family: 'Montserrat', sans-serif;
            font-size: clamp(2rem, 5vw, 3.8rem);
            font-weight: 800;
            margin-bottom: 1.5rem;
            background: linear-gradient(135deg, #fff 30%, var(--accent-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }

        .subtitle {
            font-size: 1.15rem;
            color: var(--text-secondary);
            margin-bottom: 3rem;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
            font-weight: 300;
        }

        .btn-homework {
            display: inline-flex;
            align-items: center;
            padding: 1.2rem 2.8rem;
            background: var(--text-primary);
            color: var(--bg-color);
            text-decoration: none;
            border-radius: 100px;
            font-weight: 700;
            font-size: 1rem;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .btn-homework:hover {
            transform: scale(1.05);
            background: var(--accent-blue);
            color: white;
            box-shadow: 0 0 30px rgba(56, 189, 248, 0.4);
        }

        .btn-homework span {
            margin-left: 10px;
            transition: transform 0.3s ease;
        }

        .btn-homework:hover span {
            transform: translateX(5px);
        }

        footer {
            text-align: center;
            padding: 3rem;
            color: var(--text-secondary);
            font-size: 0.8rem;
            letter-spacing: 1px;
        }

        @media (max-width: 768px) {
            .portfolio-card { padding: 3rem 1.5rem; }
            nav ul { height: auto; padding: 1.5rem 0; flex-direction: column; gap: 10px; }
            nav ul li a { padding: 0.3rem; font-size: 0.75rem; }
            h1 { margin-bottom: 1rem; }
        }
    </style>
</head>
<body>

    <nav>
        <ul>
            <li><a href="index.html" class="active">Ana Sayfa</a></li>
            <li><a href="about.html">Hakkımda</a></li>
            <li><a href="interests.html">İlgi Alanlarım</a></li>
            <li><a href="contact.html">İletişim</a></li>
        </ul>
    </nav>

    <main class="hero-section">
        <div class="portfolio-card">
            <h1>Nuran Ferhan Kasap</h1>
            <p class="subtitle">Marmara Üniversitesi Bilgisayar Mühendisliği öğrencisi. 
            Geleceğin teknolojilerini inşa etmek için web ve yazılım çözümleri geliştiriyorum.</p>
            
            <div class="cta-container">
                <a href="odevler.html" class="btn-homework">
                    Projeleri İncele <span>&rarr;</span>
                </a>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 NURAN FERHAN KASAP • MARMARA</p>
    </footer>

</body>
</html>
