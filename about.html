<head>

    <title>Hakkımda | Nuran Ferhan Kasap</title>
    <style>
        :root {
            --bg: #fdfdfd;
            --text-main: #334155;
            --text-bold: #0f172a;
            --accent: #6366f1;
            --border: #e2e8f0;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Segoe UI', system-ui, sans-serif;
            line-height: 1.7;
        }

        nav {
            border-bottom: 1px solid var(--border);
            padding: 1rem;
            background: white;
            display: flex;
            justify-content: center;
        }

        nav ul { list-style: none; display: flex; gap: 2rem; }
        nav a { text-decoration: none; color: var(--text-main); font-weight: 500; transition: 0.2s; }
        nav a:hover { color: var(--accent); }

        header {
            text-align: center;
            padding: 4rem 1rem;
            background: linear-gradient(to bottom, #f1f5f9, white);
        }

        header h1 { font-size: 2.5rem; color: var(--text-bold); margin-bottom: 10px; }

        main { max-width: 800px; margin: 0 auto; padding: 2rem; }

        section {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            border: 1px solid var(--border);
            margin-bottom: 2rem;
        }

        h2 { color: var(--text-bold); border-bottom: 2px solid var(--accent); display: inline-block; margin-bottom: 1.5rem; font-size: 1.3rem; }

        blockquote {
            background: #f8fafc;
            border-left: 4px solid var(--accent);
            padding: 1.5rem;
            font-style: italic;
            margin: 1rem 0;
            color: #475569;
        }

        .back-link { color: var(--accent); text-decoration: none; font-weight: 600; }
    </style>
</head>
