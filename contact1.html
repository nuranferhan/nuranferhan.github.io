<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İletişim | NFK</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050810;
            --accent-blue: #00d2ff;
            --accent-purple: #7b5ea7;
            --text: #f0f0f0;
            --muted: #8a8fa8;
            --glass: rgba(255,255,255,0.04);
            --glass-border: rgba(255,255,255,0.08);
            --input-bg: rgba(255, 255, 255, 0.03);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        #bg-canvas {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
        }
      
        .cursor-dot {
            width: 6px; height: 6px;
            background: var(--accent-blue);
            border-radius: 50%;
            position: fixed;
            top: 0; left: 0;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%,-50%);
        }
        .cursor-ring {
            width: 32px; height: 32px;
            border: 1.5px solid rgba(0,210,255,0.5);
            border-radius: 50%;
            position: fixed;
            top: 0; left: 0;
            pointer-events: none;
            z-index: 9998;
            transform: translate(-50%,-50%);
            transition: all 0.15s ease;
        }

        nav {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 1000;
            padding: 0 3rem;
            height: 72px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(5,8,16,0.7);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
        }

        .nav-logo {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-weight: 800;
            font-size: 1.1rem;
            background: linear-gradient(90deg, var(--accent-blue), #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-decoration: none;
        }

        nav ul { list-style: none; display: flex; gap: 0.2rem; }

        nav ul li a {
            color: var(--muted);
            text-decoration: none;
            padding: 0.4rem 1rem;
            font-size: 0.85rem;
            font-weight: 500;
            border-radius: 6px;
            transition: all 0.25s;
        }

        nav ul li a:hover, nav ul li a.active {
            color: var(--text);
            background: var(--glass);
        }
        nav ul li a.active { color: var(--accent-blue); }

        main {
            position: relative;
            z-index: 1;
            max-width: 800px;
            margin: 0 auto;
            padding: 120px 2rem 5rem;
            animation: fadeUp 0.9s ease both;
        }

        @keyframes fadeUp {
            from { opacity:0; transform: translateY(30px); }
            to   { opacity:1; transform: translateY(0); }
        }

        .form-container {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            padding: 3rem;
            border-radius: 24px;
            backdrop-filter: blur(10px);
        }

        h1 {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 2rem;
            margin-bottom: 2rem;
            text-align: center;
            background: linear-gradient(90deg, var(--accent-blue), #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .form-group { margin-bottom: 1.5rem; }

        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--muted);
            margin-bottom: 0.6rem;
            letter-spacing: 0.5px;
        }

        input[type="text"],
        input[type="email"],
        input[type="password"],
        select,
        textarea {
            width: 100%;
            padding: 0.8rem 1rem;
            background: var(--input-bg);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            color: var(--text);
            font-family: inherit;
            font-size: 0.9rem;
            transition: all 0.3s;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--accent-blue);
            background: rgba(255,255,255,0.06);
            box-shadow: 0 0 15px rgba(0,210,255,0.1);
        }

        .check-group {
            display: flex;
            flex-wrap: wrap;
            gap: 1.5rem;
            margin-top: 0.5rem;
        }

        .check-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.85rem;
            color: var(--text);
            cursor: pointer;
        }

        input[type="checkbox"], input[type="radio"] {
            accent-color: var(--accent-blue);
            width: 16px; height: 16px;
        }

        input[type="file"] {
            font-size: 0.8rem;
            color: var(--muted);
        }

        .btn-row {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
        }

        .btn-submit {
            flex: 2;
            padding: 0.9rem;
            background: linear-gradient(135deg, var(--accent-blue), #3b82f6);
            border: none;
            border-radius: 10px;
            color: #050810;
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 0 20px rgba(0,210,255,0.2);
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 30px rgba(0,210,255,0.4);
        }

        .btn-reset {
            flex: 1;
            padding: 0.9rem;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            color: var(--text);
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-reset:hover {
            background: rgba(255, 68, 68, 0.1);
            border-color: rgba(255, 68, 68, 0.3);
        }

        @media (max-width: 600px) {
            .form-container { padding: 1.5rem; }
            .btn-row { flex-direction: column; }
        }
    </style>
</head>
<body>

<canvas id="bg-canvas"></canvas>
<div class="cursor-dot" id="cursorDot"></div>
<div class="cursor-ring" id="cursorRing"></div>

<nav>
    <a href="index.html" class="nav-logo">NFK</a>
    <ul>
        <li><a href="index.html">Ana Sayfa</a></li>
        <li><a href="about.html">Hakkımda</a></li>
        <li><a href="interests.html">İlgi Alanlarım</a></li>
        <li><a href="contact1.html" class="active">İletişim</a></li>
    </ul>
</nav>

<main>
    <div class="form-container">
        <h1>Detaylı İletişim Formu</h1>
        
        <form action="#" method="post" enctype="multipart/form-data">
            <div class="form-group">
                <label for="fullname">Ad Soyad:</label>
                <input type="text" id="fullname" name="fullname" placeholder="Adınızı ve soyadınızı girin..." required>
            </div>

            <div class="form-group">
                <label for="email">E-posta Adresi:</label>
                <input type="email" id="email" name="email" placeholder="ornek@mail.com" required>
            </div>

            <div class="form-group">
                <label for="track-pw">Başvuru Takip Şifresi:</label>
                <input type="password" id="track-pw" name="track-pw" placeholder="••••••••">
            </div>

            <div class="form-group">
                <label>İletişim Tercihi:</label>
                <div class="check-group">
                    <label class="check-item"><input type="radio" name="preference" value="email"> Bana e-posta ile ulaşın</label>
                    <label class="check-item"><input type="radio" name="preference" value="phone"> Bana telefonla ulaşın</label>
                </div>
            </div>

            <div class="form-group">
                <label>İlgi Alanları / Yetenekler:</label>
                <div class="check-group">
                    <label class="check-item"><input type="checkbox" name="skill" value="html"> HTML</label>
                    <label class="check-item"><input type="checkbox" name="skill" value="css"> CSS</label>
                    <label class="check-item"><input type="checkbox" name="skill" value="algo"> Algoritma</label>
                </div>
            </div>

            <div class="form-group">
                <label for="subject">Konu:</label>
                <select id="subject" name="subject">
                    <option value="" disabled selected>Lütfen bir konu seçin...</option>
                    <option value="job">İş Teklifi</option>
                    <option value="question">Soru</option>
                    <option value="feedback">Geri Bildirim</option>
                </select>
            </div>

            <div class="form-group">
                <label for="file-upload">Özgeçmiş (CV) veya Fotoğraf Yükle:</label>
                <input type="file" id="file-upload" name="attachment">
            </div>

            <div class="form-group">
                <label for="message">Mesajınız:</label>
                <textarea id="message" name="message" rows="4" placeholder="Mesajınızı buraya yazabilirsiniz..."></textarea>
            </div>

            <div class="btn-row">
                <button type="submit" class="btn-submit">Gönder</button>
                <button type="reset" class="btn-reset">Temizle</button>
            </div>
        </form>
    </div>
</main>

<script>
    const canvas = document.getElementById('bg-canvas');
    const ctx = canvas.getContext('2d');
    let W, H, particles = [];

    function resize() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    class Particle {
        constructor() { this.reset(); }
        reset() {
            this.x = Math.random() * W;
            this.y = Math.random() * H;
            this.r = Math.random() * 1.2 + 0.3;
            this.alpha = Math.random() * 0.5 + 0.1;
            this.vx = (Math.random() - 0.5) * 0.2;
            this.vy = (Math.random() - 0.5) * 0.2;
            this.color = Math.random() > 0.5 ? '0,210,255' : '167,139,250';
        }
        update() {
            this.x += this.vx; this.y += this.vy;
            if (this.x < 0 || this.x > W || this.y < 0 || this.y > H) this.reset();
        }
        draw() {
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.r, 0, Math.PI*2);
            ctx.fillStyle = `rgba(${this.color},${this.alpha})`;
            ctx.fill();
        }
    }

    for (let i = 0; i < 100; i++) particles.push(new Particle());

    function animate() {
        ctx.clearRect(0,0,W,H);
        particles.forEach(p => { p.update(); p.draw(); });
        requestAnimationFrame(animate);
    }
    animate();

    const dot = document.getElementById('cursorDot');
    const ring = document.getElementById('cursorRing');
    let mx=0, my=0, rx=0, ry=0;
    document.addEventListener('mousemove', e => { mx=e.clientX; my=e.clientY; });

    (function moveCursor(){
        rx += (mx-rx)*0.12; ry += (my-ry)*0.12;
        dot.style.left = mx+'px'; dot.style.top = my+'px';
        ring.style.left = rx+'px'; ring.style.top= ry+'px';
        requestAnimationFrame(moveCursor);
    })();

    document.querySelectorAll('button, a, input, select, textarea').forEach(el => {
        el.addEventListener('mouseenter', () => { ring.style.transform='translate(-50%,-50%) scale(1.6)'; ring.style.opacity='0.5'; });
        el.addEventListener('mouseleave', () => { ring.style.transform='translate(-50%,-50%) scale(1)'; ring.style.opacity='1'; });
    });
</script>
</body>
</html>
