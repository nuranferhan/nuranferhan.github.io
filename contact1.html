<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İletişim | NFK</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050810;
            --accent-blue: #00d2ff;
            --accent-purple: #7b5ea7;
            --text: #f0f0f0;
            --muted: #8a8fa8;
            --glass: rgba(255,255,255,0.04);
            --glass-border: rgba(255,255,255,0.08);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        #bg-canvas {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
        }

        .cursor-dot {
            width: 6px; height: 6px;
            background: var(--accent-blue);
            border-radius: 50%;
            position: fixed;
            top: 0; left: 0;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%,-50%);
        }

        .cursor-ring {
            width: 32px; height: 32px;
            border: 1.5px solid rgba(0,210,255,0.5);
            border-radius: 50%;
            position: fixed;
            top: 0; left: 0;
            pointer-events: none;
            z-index: 9998;
            transform: translate(-50%,-50%);
            transition: all 0.15s ease;
        }

        nav {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 1000;
            padding: 0 4rem;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(5,8,16,0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
        }

        .nav-logo {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-weight: 800;
            font-size: 1.4rem;
            background: linear-gradient(90deg, var(--accent-blue), #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-decoration: none;
            flex: 1;
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 1.5rem;
            justify-content: center;
            flex: 2;
        }

        nav ul li a {
            color: var(--muted);
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 500;
            transition: all 0.3s;
        }

        nav ul li a:hover, nav ul li a.active {
            color: var(--accent-blue);
        }

        .nav-socials {
            display: flex;
            gap: 1rem;
            justify-content: flex-end;
            flex: 1;
        }

        .nav-social-link {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            border: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--muted);
            transition: all 0.3s;
            background: var(--glass);
        }

        .nav-social-link:hover {
            border-color: var(--accent-blue);
            color: var(--accent-blue);
        }

        .nav-social-link svg {
            width: 18px;
            height: 18px;
            fill: currentColor;
        }

        main {
            position: relative;
            z-index: 1;
            max-width: 800px;
            margin: 0 auto;
            padding: 140px 2rem 5rem;
            animation: fadeUp 0.9s ease both;
        }

        @keyframes fadeUp {
            from { opacity:0; transform: translateY(30px); }
            to   { opacity:1; transform: translateY(0); }
        }

        h1 {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 3rem;
            margin-bottom: 1rem;
            background: linear-gradient(90deg, var(--accent-blue), #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .contact-desc {
            color: var(--muted);
            margin-bottom: 3rem;
            font-size: 1.1rem;
        }

        .contact-card {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            padding: 2.5rem;
            border-radius: 24px;
            display: grid;
            gap: 2rem;
        }

        .contact-item {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            text-decoration: none;
            color: var(--text);
            transition: all 0.3s;
        }

        .contact-item:hover {
            transform: translateX(10px);
        }

        .icon-box {
            width: 50px;
            height: 50px;
            background: rgba(0,210,255,0.1);
            border: 1px solid rgba(0,210,255,0.2);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent-blue);
        }

        .contact-info h4 {
            font-size: 0.8rem;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 0.2rem;
        }

        .contact-info p {
            font-size: 1.1rem;
            font-weight: 500;
        }

        @media (max-width: 992px) {
            nav { padding: 0 1.5rem; }
            nav ul { display: none; }
        }
    </style>
</head>

<script>
    const canvas = document.getElementById('bg-canvas');
    const ctx = canvas.getContext('2d');
    let W, H, particles = [];

    function resize() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    class Particle {
        constructor() { this.reset(); }
        reset() {
            this.x = Math.random() * W;
            this.y = Math.random() * H;
            this.r = Math.random() * 1.2 + 0.3;
            this.alpha = Math.random() * 0.5 + 0.1;
            this.vx = (Math.random() - 0.5) * 0.2;
            this.vy = (Math.random() - 0.5) * 0.2;
            this.color = Math.random() > 0.5 ? '0,210,255' : '167,139,250';
        }
        update() {
            this.x += this.vx; this.y += this.vy;
            if (this.x < 0 || this.x > W || this.y < 0 || this.y > H) this.reset();
        }
        draw() {
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.r, 0, Math.PI*2);
            ctx.fillStyle = `rgba(${this.color},${this.alpha})`;
            ctx.fill();
        }
    }

    for (let i = 0; i < 100; i++) particles.push(new Particle());

    function animate() {
        ctx.clearRect(0,0,W,H);
        particles.forEach(p => { p.update(); p.draw(); });
        requestAnimationFrame(animate);
    }
    animate();

    const dot = document.getElementById('cursorDot');
    const ring = document.getElementById('cursorRing');
    let mx=0, my=0, rx=0, ry=0;
    document.addEventListener('mousemove', e => { mx=e.clientX; my=e.clientY; });

    (function moveCursor(){
        rx += (mx-rx)*0.12; ry += (my-ry)*0.12;
        dot.style.left = mx+'px'; dot.style.top = my+'px';
        ring.style.left = rx+'px'; ring.style.top= ry+'px';
        requestAnimationFrame(moveCursor);
    })();
</script>
