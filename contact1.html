<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İletişim | NFK</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050810;
            --accent-blue: #00d2ff;
            --accent-purple: #7b5ea7;
            --accent-glow: rgba(0, 210, 255, 0.15);
            --text: #f0f0f0;
            --muted: #8a8fa8;
            --glass: rgba(255,255,255,0.04);
            --glass-border: rgba(255,255,255,0.08);
            --card-shadow: 0 30px 80px rgba(0,0,0,0.6);
            --input-bg: rgba(255, 255, 255, 0.03);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html { scroll-behavior: smooth; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        #bg-canvas {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
        }

        .cursor-dot {
            width: 6px; height: 6px;
            background: var(--accent-blue);
            border-radius: 50%;
            position: fixed;
            top: 0; left: 0;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%,-50%);
            transition: transform 0.05s;
        }
        .cursor-ring {
            width: 32px; height: 32px;
            border: 1.5px solid rgba(0,210,255,0.5);
            border-radius: 50%;
            position: fixed;
            top: 0; left: 0;
            pointer-events: none;
            z-index: 9998;
            transform: translate(-50%,-50%);
            transition: all 0.15s ease;
        }

        nav {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 1000;
            padding: 0 3rem;
            height: 72px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(5,8,16,0.7);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
        }

        .nav-logo {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-weight: 800;
            font-size: 1.1rem;
            background: linear-gradient(90deg, var(--accent-blue), #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 0.5px;
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 0.2rem;
        }

        nav ul li a {
            color: var(--muted);
            text-decoration: none;
            padding: 0.4rem 1rem;
            font-size: 0.85rem;
            font-weight: 500;
            letter-spacing: 0.5px;
            border-radius: 6px;
            transition: all 0.25s;
        }

        nav ul li a:hover, nav ul li a.active {
            color: var(--text);
            background: var(--glass);
        }

        nav ul li a.active { color: var(--accent-blue); }

        .nav-socials {
            display: flex;
            gap: 0.75rem;
            align-items: center;
        }

        .nav-social-link {
            width: 34px; height: 34px;
            border-radius: 8px;
            border: 1px solid var(--glass-border);
            display: flex; align-items: center; justify-content: center;
            color: var(--muted);
            text-decoration: none;
            transition: all 0.25s;
            background: var(--glass);
        }

        .nav-social-link:hover {
            border-color: rgba(0,210,255,0.4);
            color: var(--accent-blue);
            box-shadow: 0 0 15px rgba(0,210,255,0.15);
        }

        .nav-social-link svg { width: 16px; height: 16px; fill: currentColor; }

        main {
            position: relative;
            z-index: 1;
            max-width: 800px;
            margin: 0 auto;
            padding: 120px 2rem 5rem;
            animation: fadeUp 0.9s ease both;
        }

        @keyframes fadeUp {
            from { opacity:0; transform: translateY(30px); }
            to   { opacity:1; transform: translateY(0); }
        }

        .form-container {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            padding: 3rem;
            border-radius: 24px;
            backdrop-filter: blur(10px);
        }

        h1 {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 2rem;
            margin-bottom: 2rem;
            text-align: center;
            background: linear-gradient(90deg, var(--accent-blue), #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .form-group { margin-bottom: 1.5rem; }

        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--muted);
            margin-bottom: 0.6rem;
            letter-spacing: 0.5px;
        }

        input[type="text"],
        input[type="email"],
        input[type="password"],
        select,
        textarea {
            width: 100%;
            padding: 0.8rem 1rem;
            background: var(--input-bg);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            color: var(--text);
            font-family: inherit;
            font-size: 0.9rem;
            transition: all 0.3s;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--accent-blue);
            background: rgba(255,255,255,0.06);
            box-shadow: 0 0 15px rgba(0,210,255,0.1);
        }

        .check-group {
            display: flex;
            flex-wrap: wrap;
            gap: 1.5rem;
            margin-top: 0.5rem;
        }

        .check-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.85rem;
            color: var(--text);
            cursor: pointer;
        }

        input[type="checkbox"], input[type="radio"] {
            accent-color: var(--accent-blue);
            width: 16px; height: 16px;
        }

        .btn-row {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
        }

        .btn-submit {
            flex: 2;
            padding: 0.9rem;
            background: linear-gradient(135deg, var(--accent-blue), #3b82f6);
            border: none;
            border-radius: 10px;
            color: #050810;
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 0 20px rgba(0,210,255,0.2);
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 30px rgba(0,210,255,0.4);
        }

        .btn-reset {
            flex: 1;
            padding: 0.9rem;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            color: var(--text);
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-reset:hover {
            background: rgba(255, 68, 68, 0.1);
            border-color: rgba(255, 68, 68, 0.3);
        }

        @media (max-width: 768px) {
            nav { padding: 0 1.2rem; }
            .nav-socials { display: none; }
            .form-container { padding: 1.5rem; }
            .btn-row { flex-direction: column; }
        }
    </style>
</head>
<body>

<canvas id="bg-canvas"></canvas>
<div class="cursor-dot" id="cursorDot"></div>
<div class="cursor-ring" id="cursorRing"></div>

<nav>
    <span class="nav-logo">NFK</span>
    <ul>
        <li><a href="index.html">Ana Sayfa</a></li>
        <li><a href="about.html">Hakkımda</a></li>
        <li><a href="interests.html">İlgi Alanlarım</a></li>
        <li><a href="contact1.html" class="active">İletişim</a></li>
    </ul>
    <div class="nav-socials">
        <a href="https://github.com/nuranferhan" target="_blank" class="nav-social-link" title="GitHub">
            <svg viewBox="0 0 24 24"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.3 3.44 9.8 8.21 11.39.6.11.82-.26.82-.58v-2.04c-3.34.72-4.04-1.61-4.04-1.61-.55-1.39-1.34-1.76-1.34-1.76-1.09-.74.08-.73.08-.73 1.2.09 1.84 1.24 1.84 1.24 1.07 1.83 2.81 1.3 3.5 1 .11-.78.42-1.3.76-1.6-2.67-.3-5.47-1.33-5.47-5.93 0-1.31.47-2.38 1.24-3.22-.13-.3-.54-1.52.12-3.18 0 0 1.01-.32 3.3 1.23a11.5 11.5 0 0 1 3-.4c1.02 0 2.04.13 3 .4 2.28-1.55 3.29-1.23 3.29-1.23.66 1.66.25 2.88.12 3.18.77.84 1.24 1.91 1.24 3.22 0 4.61-2.81 5.63-5.48 5.92.43.37.81 1.1.81 2.22v3.29c0 .32.22.7.83.58C20.57 21.8 24 17.3 24 12 24 5.37 18.63 0 12 0z"/></svg>
        </a>
        <a href="https://www.linkedin.com/in/nuran-ferhan/" target="_blank" class="nav-social-link" title="LinkedIn">
            <svg viewBox="0 0 24 24"><path d="M20.45 20.45h-3.56v-5.57c0-1.33-.03-3.04-1.85-3.04-1.85 0-2.13 1.45-2.13 2.94v5.67H9.35V9h3.41v1.56h.05c.48-.9 1.64-1.85 3.37-1.85 3.6 0 4.27 2.37 4.27 5.45v6.29zM5.34 7.43a2.07 2.07 0 1 1 0-4.14 2.07 2.07 0 0 1 0 4.14zM7.12 20.45H3.56V9h3.56v11.45zM22.23 0H1.77C.79 0 0 .77 0 1.72v20.56C0 23.23.79 24 1.77 24h20.46C23.2 24 24 23.23 24 22.28V1.72C24 .77 23.2 0 22.23 0z"/></svg>
        </a>
    </div>
</nav>

<main>
    <div class="form-container">
        <h1>Detaylı İletişim Formu</h1>
        <form action="#" method="post" enctype="multipart/form-data">
            <div class="form-group">
                <label for="fullname">Ad Soyad:</label>
                <input type="text" id="fullname" name="fullname" placeholder="Adınızı ve soyadınızı girin..." required>
            </div>
            <div class="form-group">
                <label for="email">E-posta Adresi:</label>
                <input type="email" id="email" name="email" placeholder="ornek@mail.com" required>
            </div>
            <div class="form-group">
                <label>İlgi Alanlarınız:</label>
                <div class="check-group">
                    <label class="check-item"><input type="checkbox" name="interest" value="web"> Web Tasarım</label>
                    <label class="check-item"><input type="checkbox" name="interest" value="software"> Yazılım</label>
                    <label class="check-item"><input type="checkbox" name="interest" value="ai"> Yapay Zeka</label>
                </div>
            </div>
            <div class="form-group">
                <label for="message">Mesajınız:</label>
                <textarea id="message" name="message" rows="5" placeholder="Mesajınızı buraya yazın..."></textarea>
            </div>
            <div class="btn-row">
                <button type="reset" class="btn-reset">Temizle</button>
                <button type="submit" class="btn-submit">Gönder</button>
            </div>
        </form>
    </div>
</main>

<script>
const canvas = document.getElementById('bg-canvas');
const ctx = canvas.getContext('2d');
let W, H, particles = [];

function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

class Particle {
    constructor() { this.reset(); }
    reset() {
        this.x = Math.random() * W;
        this.y = Math.random() * H;
        this.r = Math.random() * 1.2 + 0.3;
        this.alpha = Math.random() * 0.5 + 0.1;
        this.vx = (Math.random() - 0.5) * 0.2;
        this.vy = (Math.random() - 0.5) * 0.2;
        this.color = Math.random() > 0.5 ? '0,210,255' : '167,139,250';
    }
    update() {
        this.x += this.vx; this.y += this.vy;
        if (this.x < 0 || this.x > W || this.y < 0 || this.y > H) this.reset();
    }
    draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.r, 0, Math.PI*2);
        ctx.fillStyle = `rgba(${this.color},${this.alpha})`;
        ctx.fill();
    }
}

for (let i = 0; i < 120; i++) particles.push(new Particle());

function drawConnections() {
    for (let i = 0; i < particles.length; i++) {
        for (let j = i+1; j < particles.length; j++) {
            const dx = particles[i].x - particles[j].x;
            const dy = particles[i].y - particles[j].y;
            const d = Math.sqrt(dx*dx+dy*dy);
            if (d < 100) {
                ctx.beginPath();
                ctx.moveTo(particles[i].x, particles[i].y);
                ctx.lineTo(particles[j].x, particles[j].y);
                ctx.strokeStyle = `rgba(0,210,255,${0.06*(1-d/100)})`;
                ctx.lineWidth = 0.5;
                ctx.stroke();
            }
        }
    }
}

function animate() {
    ctx.clearRect(0,0,W,H);
    const g = ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,W*0.8);
    g.addColorStop(0,'rgba(48,43,99,0.15)');
    g.addColorStop(1,'transparent');
    ctx.fillStyle = g;
    ctx.fillRect(0,0,W,H);

    drawConnections();
    particles.forEach(p => { p.update(); p.draw(); });
    requestAnimationFrame(animate);
}
animate();

const dot  = document.getElementById('cursorDot');
const ring = document.getElementById('cursorRing');
let mx=0, my=0, rx=0, ry=0;
document.addEventListener('mousemove', e => { mx=e.clientX; my=e.clientY; });

(function moveCursor(){
    rx += (mx-rx)*0.12; ry += (my-ry)*0.12;
    dot.style.left  = mx+'px'; dot.style.top = my+'px';
    ring.style.left = rx+'px'; ring.style.top= ry+'px';
    requestAnimationFrame(moveCursor);
})();

document.querySelectorAll('a, button').forEach(el => {
    el.addEventListener('mouseenter', () => { ring.style.transform='translate(-50%,-50%) scale(1.6)'; ring.style.opacity='0.5'; });
    el.addEventListener('mouseleave', () => { ring.style.transform='translate(-50%,-50%) scale(1)'; ring.style.opacity='1'; });
});

window.addEventListener('scroll', () => {
    const nav = document.querySelector('nav');
    nav.style.background = window.scrollY > 20 ? 'rgba(5,8,16,0.92)' : 'rgba(5,8,16,0.7)';
});
</script>
</body>
</html>
